<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSCU LIB 國立南十字大學圖書館</title>
    <!-- 引入 Tailwind CSS 用於現代化響應式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse 解析 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts 引入高質感字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ntu: {
                            red: '#9e1d22',     /* 經典台大紅 */
                            darkred: '#7d1216', /* 深台大紅 */
                            lightbg: '#fcfcfc', /* 溫慢白 */
                            graybg: '#f4f4f5',  /* 淺灰 */
                            border: '#e4e4e7',  /* 邊框灰 */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        /* 自訂細微滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

<!-- 紅底白字頂部 Banner -->
<header class="bg-ntu-red text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-6 md:py-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
                <i class="fa-solid fa-book-open text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Southern Cross University Library</h1>
                <p class="text-xs md:text-sm text-red-100/80 font-light mt-0.5 tracking-wider uppercase">
                    國立南十字大學圖書館 ｜ Dolphin Server
                </p>
            </div>
        </div>
        <!-- 動態連線狀態標籤 -->
        <div id="connectionStatus" class="flex items-center gap-2 text-xs bg-black/15 px-3 py-1.5 rounded-full border border-white/10">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span id="statusText">系統狀態：遠端資料庫同步連線中</span>
        </div>
    </div>
</header>

<main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
    <!-- 數據儀表板 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1">館藏書籍總量</span>
            <div class="flex items-baseline gap-2">
                <span class="text-3xl font-bold text-slate-900" id="totalBooks">--</span>
                <span class="text-xs text-slate-400">本</span>
            </div>
        </div>
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
            <span class="text-xs font-semibold text-emerald-600 uppercase tracking-wider block mb-1">在架上</span>
            <div class="flex items-baseline gap-2">
                <span class="text-3xl font-bold text-emerald-600" id="availableBooks">--</span>
                <span class="text-xs text-slate-400">本</span>
            </div>
        </div>
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
            <span class="text-xs font-semibold text-amber-600 uppercase tracking-wider block mb-1">借閱中</span>
            <div class="flex items-baseline gap-2">
                <span class="text-3xl font-bold text-amber-600" id="checkedOutBooks">--</span>
                <span class="text-xs text-slate-400">本</span>
            </div>
        </div>
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
            <span class="text-xs font-semibold text-ntu-red uppercase tracking-wider block mb-1">借閱率</span>
            <div class="flex items-baseline gap-2">
                <span class="text-3xl font-bold text-ntu-red" id="borrowRate">--</span>
                <span class="text-xs text-slate-400">百分比</span>
            </div>
        </div>
    </div>

    <!-- 簡約搜尋框風格 -->
    <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-8">
        <div class="flex flex-col gap-4">
            <!-- 搜尋框 -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="searchInput" 
                       class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-ntu-red focus:border-transparent transition-all shadow-inner text-base"
                       placeholder="請輸入書名、作者、索書號、DS-ISBN進行即時檢索...">
            </div>
            
            <!-- 快速分類篩選 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-medium text-slate-500 flex items-center gap-1.5 pl-1">
                        <i class="fa-solid fa-filter"></i> 學術分類與樓層
                    </label>
                    <select id="categoryFilter" 
                            class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-700 focus:outline-none focus:ring-2 focus:ring-ntu-red cursor-pointer transition-all">
                        <option value="ALL">所有學科分類</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-medium text-slate-500 flex items-center gap-1.5 pl-1">
                        <i class="fa-solid fa-circle-info"></i> 借閱狀態
                    </label>
                    <select id="statusFilter" 
                            class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-700 focus:outline-none focus:ring-2 focus:ring-ntu-red cursor-pointer transition-all">
                        <option value="ALL">所有借閱狀態</option>
                        <option value="在架上">在架上</option>
                        <option value="借閱中">借閱中</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 搜尋狀態列 -->
        <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center text-xs text-slate-500">
            <span id="searchFeedback">正在載入圖書館藏資料...</span>
            <button onclick="resetFilters()" class="text-ntu-red hover:text-ntu-darkred font-medium transition-colors flex items-center gap-1">
                <i class="fa-solid fa-arrow-rotate-left"></i> 重設所有篩選
            </button>
        </div>
    </div>

    <!-- 圖書卡片區 -->
    <div id="booksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full py-16 flex flex-col items-center justify-center text-slate-400 gap-4">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl text-ntu-red"></i>
            <span class="text-sm font-medium">正在載入資料庫，請稍候...</span>
        </div>
    </div>
</main>

<footer class="bg-slate-900 text-slate-400 border-t border-slate-800 mt-16">
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs">
        <p>© 2026 Dolphin National Southern Cross University 海豚國立南十字大學</p>
        <div class="flex gap-4">
            <a href="#" class="hover:text-white transition-colors">系統指南</a>
            <span>•</span>
            <a href="#" class="hover:text-white transition-colors">紅石自動化對照表</a>
            <span>•</span>
            <a href="#" class="hover:text-white transition-colors">管理員登入</a>
        </div>
    </div>
</footer>

<div id="toast" class="fixed bottom-8 right-8 bg-slate-950 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2.5 transition-all duration-300 transform translate-y-24 opacity-0 z-50 text-sm pointer-events-none">
    <i class="fa-solid fa-check-circle text-emerald-400"></i>
    <span id="toastMsg" class="font-medium">複製成功！</span>
</div>

<script>
    // 使用直接匯出 CSV 模式，更為穩固且不易受到發布狀態影響
    const BOOKS_CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vS01kcFvbXs1L6e_V3jInI4VB5pISZMPuz3mxTWUXQWv7Y4la2NbQxWz6i7tZ5czBgdvBI83A4jIwmc/pub?output=csv`;
    const CATEGORIES_CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vS01kcFvbXs1L6e_V3jInI4VB5pISZMPuz3mxTWUXQWv7Y4la2NbQxWz6i7tZ5czBgdvBI83A4jIwmc/pub?output=csv&gid=565039517`;

    let booksData = [];
    let categoriesData = [];

    // 初始化程式
    async function init() {
        try {
            // 同步讀取兩個 CSV 檔案
            const [catRes, booksRes] = await Promise.all([
                fetch(CATEGORIES_CSV_URL),
                fetch(BOOKS_CSV_URL)
            ]);

            if (!catRes.ok || !booksRes.ok) {
                throw new Error("HTTP 載入失敗，可能受到 CORS 跨來源原則限制");
            }

            const catCsvText = await catRes.text();
            const booksCsvText = await booksRes.text();

            // 解析 CSV 格式為 JSON
            const rawCategories = Papa.parse(catCsvText, { header: true, skipEmptyLines: true }).data;
            const rawBooks = Papa.parse(booksCsvText, { header: true, skipEmptyLines: true }).data;

            // 適配中英文欄位名稱
            categoriesData = normalizeCategories(rawCategories);
            booksData = normalizeBooks(rawBooks);

            // 啟動頁面彩現
            buildCategoryFilter();
            calculateStatistics();
            applyFilters(); // 執行初次過濾彩現

        } catch (error) {
            console.error("無法直接透過 API 獲取雲端資料庫（通常為 Canvas 安全沙盒限制）：", error);
            
            // 變更頂部狀態列提示
            const statusEl = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            if (statusEl && statusText) {
                statusEl.className = "flex items-center gap-2 text-xs bg-rose-500/25 text-rose-200 px-3 py-1.5 rounded-full border border-rose-500/30 animate-pulse";
                statusText.textContent = "系統狀態：遠端資料庫同步失敗";
            }

            // 在主畫面顯示極為精緻的引導提示，而不使用 Mock Data
            document.getElementById('booksGrid').innerHTML = `
                <div class="col-span-full py-16 text-center text-rose-600 flex flex-col items-center gap-4 bg-white border border-rose-200 rounded-2xl shadow-sm max-w-2xl mx-auto p-8">
                    <div class="w-16 h-16 rounded-full bg-rose-50 flex items-center justify-center border border-rose-100">
                        <i class="fa-solid fa-circle-exclamation text-3xl text-rose-500"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">CORS 跨來源連線限制</h3>
                    <p class="text-sm text-slate-600 leading-relaxed">
                        由於本平台預覽工具的<strong>安全沙盒環境限制</strong>，瀏覽器阻止了向 Google 試算表直接獲取資料（CORS）。這代表網頁在目前的 Canvas 預覽框內無法直接更新。
                    </p>
                    <div class="w-full text-left bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-2">
                        <p class="font-bold text-slate-700"><i class="fa-solid fa-circle-info text-blue-500 mr-1"></i> 如何讓它正常運作？</p>
                        <ol class="list-decimal list-inside space-y-1">
                            <li>點選網頁編輯器右上角的 <strong>Export</strong> 或複製全部程式碼。</li>
                            <li>將程式碼存為電腦本機的 <strong>index.html</strong> 檔案。</li>
                            <li>雙擊該檔案直接在 Chrome、Safari 或 Edge 瀏覽器中打開。</li>
                            <li>本機獨立開啟時，即可完美直接連線並即時同步您的 Google 試算表資料！</li>
                        </ol>
                    </div>
                </div>`;
            
            document.getElementById('searchFeedback').innerHTML = `<span class="text-rose-500 font-semibold"><i class="fa-solid fa-triangle-exclamation"></i> 遠端同步受限於瀏覽器沙盒，請下載至本機運行。</span>`;
        }
    }

    // 中英文欄位適配器：分類表
    function normalizeCategories(rawList) {
        return rawList.map(row => {
            return {
                code: (row['code'] || row['分類代碼'] || '').trim(),
                name: (row['name'] || row['分類名稱'] || '').trim(),
                floor: (row['floor'] || row['放置樓層'] || '').trim(),
                total_rows: (row['total_rows'] || row['總書架排數'] || '').trim()
            };
        }).filter(cat => cat.code && cat.name);
    }

    // 中英文欄位適配器：書籍表
    function normalizeBooks(rawList) {
        return rawList.map(row => {
            return {
                id: (row['id'] || row['索書號'] || '').trim(),
                title: (row['title'] || row['書名'] || '').trim(),
                author: (row['author'] || row['作者'] || '').trim(),
                category: (row['category'] || row['主分類'] || '').trim(),
                sub_category: (row['sub_category'] || row['細部分類'] || '').trim(),
                location: (row['location'] || row['位置'] || '').trim(),
                description: (row['description'] || row['簡介'] || '').trim(),
                status: (row['status'] || row['狀態'] || '').trim(),
                isbn: (row['isbn'] || row['DS-ISBN'] || row['ISBN'] || '').trim()
            };
        }).filter(book => book.id && book.title);
    }

    // 動態建置分類下拉選單
    function buildCategoryFilter() {
        const filterSelect = document.getElementById('categoryFilter');
        filterSelect.innerHTML = '<option value="ALL">所有學科分類</option>';
        
        categoriesData.forEach(cat => {
            if (cat.code && cat.name) {
                const opt = document.createElement('option');
                opt.value = cat.name; // 對應 Books 中填寫的「主分類 / category」
                opt.textContent = `${cat.code} ${cat.name} (${cat.floor})`;
                filterSelect.appendChild(opt);
            }
        });
    }

    // 計算與渲染數據儀表板
    function calculateStatistics() {
        const validBooks = booksData.filter(b => b.id && b.title);
        const total = validBooks.length;
        // 同步相容「在架上」與舊版「在館中」欄位狀態
        const available = validBooks.filter(b => b.status === '在架上' || b.status === '在館中').length;
        const checkedOut = total - available;
        const rate = total > 0 ? ((checkedOut / total) * 100).toFixed(1) + '%' : '0.0%';

        document.getElementById('totalBooks').textContent = total;
        document.getElementById('availableBooks').textContent = available;
        document.getElementById('checkedOutBooks').textContent = checkedOut;
        document.getElementById('borrowRate').textContent = rate;
    }

    // 彩現書籍卡片
    function renderBooks(data) {
        const grid = document.getElementById('booksGrid');
        grid.innerHTML = '';

        const validBooks = data.filter(book => book.id && book.title);

        if (validBooks.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-16 text-center text-slate-400 flex flex-col items-center gap-2">
                    <i class="fa-regular fa-folder-open text-3xl"></i>
                    <p class="text-sm">查無任何符合條件的圖書。</p>
                </div>`;
            return;
        }

        validBooks.forEach(book => {
            const isAvailable = (book.status === '在架上' || book.status === '在館中');
            const statusClass = isAvailable 
                ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
                : 'bg-rose-50 text-rose-700 border-rose-200';
            
            // 統一對外顯示為玩家定義的「在架上 / 借閱中」
            const displayStatusText = isAvailable ? '在架上' : '借閱中';
            
            const rawLocation = book.location ? book.location.trim() : '未標記';
            
            // 處理反斜線座標相容邏輯：
            // 1. 在畫面顯示：將 `124\-32\14` 轉為更美觀易讀的 `124, -32, 14`
            // 2. 在複製時：將反斜線替換為空格 `124 -32 14`，便於直接在 MC 中貼上 `/tp 124 -32 14` 指令
            const displayLocation = rawLocation !== '未標記' ? rawLocation.replace(/\\/g, ', ') : '未標記';
            const copyLocation = rawLocation !== '未標記' ? rawLocation.replace(/\\/g, ' ') : '未標記';
            
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl border border-slate-200 p-6 flex flex-col justify-between hover:shadow-lg hover:border-slate-300 transition-all duration-200 relative group';
            
            card.innerHTML = `
                <div>
                    <!-- 主分類標籤 -->
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <span class="text-xs font-semibold px-2.5 py-1 bg-slate-100 text-slate-600 rounded-full border border-slate-200">
                            ${book.category || '未分類'} ${book.sub_category ? '· ' + book.sub_category : ''}
                        </span>
                        <span class="text-[10px] font-mono text-slate-400 group-hover:text-slate-500 transition-colors">
                            NSCULIB INDEX
                        </span>
                    </div>

                    <!-- 書名與作者 -->
                    <h3 class="text-lg font-bold text-slate-900 leading-snug mb-1 group-hover:text-ntu-red transition-colors">
                        ${book.title}
                    </h3>
                    <p class="text-sm text-slate-500 mb-4 flex items-center gap-1.5">
                        <i class="fa-solid fa-pen-nib text-xs"></i> ${book.author || '未知著者'}
                    </p>

                    <!-- 書籍簡介 -->
                    <p class="text-xs text-slate-600 leading-relaxed bg-slate-50 rounded-lg p-3 border border-slate-100 mb-4">
                        ${book.description || '暫無此圖書的詳細簡介，歡迎入館參閱實體書。'}
                    </p>
                </div>

                <!-- 底部索引標籤 (點擊複製) -->
                <div class="pt-3 border-t border-slate-100">
                    <div class="flex flex-col gap-2 mb-4">
                        <!-- 索書號 -->
                        <div onclick="copyValue('${book.id}', '索書號')" 
                             class="flex items-center justify-between px-3 py-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg cursor-pointer text-xs font-mono transition-colors"
                             title="點擊一鍵複製索書號">
                            <span class="text-slate-500 font-sans"><i class="fa-solid fa-barcode mr-1"></i> 索書號</span>
                            <span class="font-bold text-slate-800">${book.id} <i class="fa-regular fa-copy ml-1 text-slate-400"></i></span>
                        </div>
                        <!-- Minecraft 座標 -->
                        <div onclick="copyValue('${copyLocation}', 'Minecraft 座標')" 
                             class="flex items-center justify-between px-3 py-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg cursor-pointer text-xs font-mono transition-colors"
                             title="一鍵複製指令座標（自動轉為空格，便於 /tp 指令）">
                            <span class="text-slate-500 font-sans"><i class="fa-solid fa-location-dot mr-1"></i> MC座標</span>
                            <span class="font-bold text-slate-800">${displayLocation} <i class="fa-regular fa-copy ml-1 text-slate-400"></i></span>
                        </div>
                    </div>

                    <!-- 借閱狀態與 ISBN -->
                    <div class="flex justify-between items-center text-xs">
                        <span class="px-2.5 py-1 rounded-full border font-semibold text-[11px] ${statusClass}">
                            ${displayStatusText}
                        </span>
                        <span class="text-slate-400 font-mono">
                            ${book.isbn ? 'ISBN: ' + book.isbn : ''}
                        </span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 搜尋與多重過濾邏輯（增加對應「在架上/借閱中」與「在館中/已借出」的交叉過濾能力）
    function applyFilters() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const category = document.getElementById('categoryFilter').value;
        const status = document.getElementById('statusFilter').value;

        const filtered = booksData.filter(book => {
            if (!book.id || !book.title) return false;

            const matchesSearch = 
                book.title.toLowerCase().includes(query) ||
                (book.author && book.author.toLowerCase().includes(query)) ||
                book.id.toLowerCase().includes(query) ||
                (book.isbn && book.isbn.toLowerCase().includes(query));

            const matchesCategory = (category === 'ALL' || book.category === category);
            
            // 狀態過濾向下相容
            let matchesStatus = true;
            if (status !== 'ALL') {
                if (status === '在架上') {
                    matchesStatus = (book.status === '在架上' || book.status === '在館中');
                } else if (status === '借閱中') {
                    matchesStatus = (book.status === '借閱中' || book.status === '已借出');
                } else {
                    matchesStatus = (book.status === status);
                }
            }

            return matchesSearch && matchesCategory && matchesStatus;
        });

        renderBooks(filtered);

        // 更新搜尋狀態回饋
        const feedback = document.getElementById('searchFeedback');
        feedback.innerHTML = `檢索完成：共尋獲 <strong class="text-ntu-red">${filtered.length}</strong> 本相關圖書`;
    }

    // 重設所有篩選器
    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoryFilter').value = 'ALL';
        document.getElementById('statusFilter').value = 'ALL';
        applyFilters();
        showToast("所有檢索篩選已重設");
    }

    // 複製到剪貼簿功能
    function copyValue(text, type) {
        if (!text || text === '未標記') return;
        
        navigator.clipboard.writeText(text).then(() => {
            showToast(`${type}已成功複製：${text}`);
        }).catch(err => {
            // 備用傳統複製法
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            showToast(`${type}已成功複製：${text}`);
        });
    }

    // 顯示客製化滑入輕提示 Toast
    function showToast(message) {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        toastMsg.textContent = message;
        toast.classList.remove('translate-y-24', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
        
        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-24', 'opacity-0');
        }, 2800);
    }

    window.onload = init;
</script>
</body>
</html>
